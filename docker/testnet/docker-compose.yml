services:
  qubic-testnet:
    platform: linux/amd64
    build:
      context: ../..           # core-lite/ root
      dockerfile: docker/testnet/Dockerfile
    image: qubic-testnet:latest
    container_name: qubic-testnet
    restart: unless-stopped
    ports:
      - "31841:31841"          # P2P testnet
      - "41841:41841"          # HTTP RPC API
    volumes:
      - qubic-testnet-data:/qubic
    environment:
      TICKING_DELAY: "3000"   # ms per tick (testnet default 7000; 1000 = faster)
      QUBIC_DATA_DIR: "/qubic"
    stop_grace_period: 30s

  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    container_name: qubic-indexer
    restart: unless-stopped
    depends_on:
      - qubic-testnet
    ports:
      - "3001:3001"            # Indexer REST API
    volumes:
      - qubic-indexer-data:/data
    environment:
      NODE_URL:  "http://qubic-testnet:41841"
      DB_PATH:   "/data/indexer.db"
      HTTP_PORT: "3001"
      POLL_MS:   "500"

volumes:
  qubic-testnet-data:
  qubic-indexer-data:
